# 基础配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false                             # 彻底禁用 IPv6，减少解析延迟和断流
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 缓存配置
profile:
  store-selected: true
  store-fake-ip: true

# DNS 配置
dns:
  enable: true
  ipv6: false
  prefer-h3: false                      # 关闭 H3 以防运营商 UDP 阻断导致解析卡顿
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false                  # Fake-IP 模式下设为 false 以实现秒开
  use-hosts: true
  use-system-hosts: false

  # Fake-IP 白名单：以下域名不返回虚假 IP，解决 NTP 时间同步、部分网游和国内特殊服务问题
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "ntp.*.com"
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - "+.pool.ntp.org"
    - "time1.cloud.tencent.com"

  # 默认 DNS：用于解析未匹配规则的域名
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 代理节点域名解析：确保能快速连上你的节点服务器
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 直连域名解析：仅使用国内明文 DNS，稳定高效
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 细分策略解析
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "+.makima.online":
      - 119.29.29.29

  # 备用 DNS：当 nameserver 失败时尝试
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.fmta.boo"

# TUN 模式配置
tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - "any:53"
  auto-route: true
  auto-detect-interface: true
